name: Steam New Releases

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore seen games cache
        uses: actions/cache@v4
        with:
          path: seen_games.json
          key: seen-games-${{ github.run_id }}
          restore-keys: seen-games-

      - name: Run SteamExtract
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python steam_extract.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add new_releases.txt seen_games.json
          git diff --cached --quiet || git commit -m "Update new releases [$(date +'%Y-%m-%d %H:%M')]"
          git push
